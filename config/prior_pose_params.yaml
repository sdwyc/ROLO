#   frame_id: $(arg frame_id)
#   topic: $(arg pcd_topic)
#   latch: true

ground_factor_node:
  pose_topic: /move_base_simple/goal
  # pose_cov_topic: /initialpose
  pose_cov_topic: /fused_odom_future_local_marker
  # frame_id: map
  frame_id: base_link
  child_frame_id: prior_base
  mesh_resource: package://rolo/resource/meshes/vehicle.dae
  marker_scale: 1.0

  # Vehicle model
  vehicle_size_xy: 2.0
  vehicle_com_z: 1.0
  wheel_xy:  # clockwise base vertices in body frame
    - [-0.747, 0.463] # left-rear
    - [0.713, 0.463] # left-front
    - [0.747, -0.463] # right-front
    - [-0.713, -0.463] # right-rear

  # Solver
  k_spring: 20.0
  g: 1.0
  max_iters: 50
  lm_lambda: 0.01
  tol_cost: 1.0e-12
  tol_step: 1.0e-10
  ground_avg_radius: 0.3
  ground_min_neighbors: 5
  tolerance_z_min: -8.0
  tolerance_z_max: 8.0
  tolerance_roll: 0.5
  tolerance_pitch: 0.5
  tolerance_wheel_distance: 0.1
  publish_tf: true
  publish_model_marker: true
  model_marker_width: 0.05
  verbose: false

  # Mesh alignment (optional)
  mesh_offset: [0.0, 0.0, -1.0]
  mesh_rpy: [0.0, 0.0, 0.0]
  mesh_wheel_points:  # wheel 3D points in mesh frame, same order as wheel_xy
    - [-0.747, 0.463] # left-rear
    - [0.713, 0.463] # left-front
    - [0.747, -0.463] # right-front
    - [-0.713, -0.463] # right-rear
